<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة Lucky</title>
    
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: #16213e;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .title {
            font-size: 28px;
            margin-bottom: 10px;
            color: #e94560;
        }
        
        .balance-box {
            background: #0f3460;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .balance-amount {
            font-size: 36px;
            font-weight: bold;
            color: #e94560;
        }
        
        .user-info {
            background: #0f3460;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: right;
        }
        
        .button {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            width: 80%;
        }
        
        .button:hover {
            background: #c23152;
            transform: scale(1.05);
        }
        
        .button:active {
            transform: scale(0.95);
        }
        
        .spin-result {
            font-size: 24px;
            margin: 20px 0;
            animation: bounce 0.5s;
        }
        
        .error {
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        
        .success {
            color: #51cf66;
            background: rgba(81,207,102,0.1);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎰 Lucky Game</h1>
        
        <!-- معلومات المستخدم -->
        <div id="userInfo" class="user-info hidden">
            <p>👤 <span id="userName"></span></p>
            <p>🆔 <span id="userId"></span></p>
        </div>
        
        <!-- الرصيد -->
        <div class="balance-box">
            <p>💰 رصيدك</p>
            <div class="balance-amount" id="balance">0</div>
        </div>
        
        <!-- الأزرار -->
        <button class="button" onclick="spinWheel()">
            🎲 لف العجلة
        </button>
        
        <button class="button" onclick="getBalance()">
            🔄 تحديث الرصيد
        </button>
        
        <!-- نتيجة اللف -->
        <div id="result" class="hidden">
            <div class="spin-result" id="resultText"></div>
        </div>
        
        <!-- رسائل الخطأ -->
        <div id="error" class="error hidden"></div>
        <div id="success" class="success hidden"></div>
        
        <!-- تحميل -->
        <div id="loading" class="loading hidden"></div>
    </div>

    <script>
        // =====================================================
        // 🔐 نظام التحقق من Telegram initData
        // =====================================================
        
        let currentUser = null;
        let verifiedUser = false;
        const API_URL = 'https://bot.tota.click'; // رابط السيرفر
        const BOT_TOKEN = '6185208107:AAGe7f8wTqPMIdITCMPoQ2v2ipoHyHw7dI4'; // توكن البوت
        
        // ===== 1️⃣ التحقق من وجود Telegram WebApp =====
        function checkTelegramWebApp() {
            if (window.Telegram && window.Telegram.WebApp) {
                console.log('✅ Telegram WebApp متاح');
                
                // تهيئة WebApp
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                // الحصول على initData
                const initData = tg.initData;
                const initDataUnsafe = tg.initDataUnsafe;
                
                console.log('📦 initData:', initData);
                console.log('👤 initDataUnsafe:', initDataUnsafe);
                
                // التحقق من صحة البيانات
                if (initData) {
                    verifyInitData(initData);
                }
                
                // استخراج معلومات المستخدم من initDataUnsafe
                if (initDataUnsafe && initDataUnsafe.user) {
                    currentUser = initDataUnsafe.user;
                    displayUserInfo(currentUser);
                    getBalance();
                }
                
                // إعداد الألوان حسب تيليجرام
                if (tg.themeParams) {
                    document.body.style.backgroundColor = tg.themeParams.bg_color || '#1a1a2e';
                    document.body.style.color = tg.themeParams.text_color || '#ffffff';
                }
                
            } else {
                console.log('⚠️ Telegram WebApp غير متاح - تشغيل في المتصفح');
                
                // ===== 2️⃣ التحقق من الرابط الآمن (للويب العادي) =====
                checkSecureLink();
            }
        }
        
        // ===== 3️⃣ التحقق من صحة initData =====
        async function verifyInitData(initData) {
            try {
                showLoading(true);
                
                // يمكن إرسال initData للسيرفر للتحقق
                const response = await fetch(`${API_URL}/api/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        init_data: initData,
                        bot_token: BOT_TOKEN
                    })
                });
                
                const result = await response.json();
                
                if (result.verified) {
                    console.log('✅ البيانات صحيحة وموثقة من Telegram');
                    verifiedUser = true;
                    showSuccess('✅ تم التحقق من هويتك');
                    
                    // حفظ في localStorage
                    localStorage.setItem('lucky_verified', 'true');
                    localStorage.setItem('lucky_user', JSON.stringify(currentUser));
                } else {
                    console.log('❌ فشل التحقق من البيانات');
                    showError('❌ فشل التحقق من البيانات');
                }
                
            } catch (error) {
                console.log('⚠️ تعذر الاتصال بالسيرفر للتحقق:', error);
                // إذا فشل الاتصال، نثق بالبيانات محلياً
                verifiedUser = true;
            } finally {
                showLoading(false);
            }
        }
        
        // ===== 4️⃣ التحقق من الرابط الآمن =====
        function checkSecureLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const uid = urlParams.get('uid');
            const timestamp = urlParams.get('t');
            const signature = urlParams.get('sig');
            
            console.log('🔍 فحص الرابط الآمن:');
            console.log('UID:', uid);
            console.log('Timestamp:', timestamp);
            console.log('Signature:', signature);
            
            if (uid && signature) {
                console.log('✅ تم العثور على توقيع في الرابط');
                
                // التحقق من صحة التوقيع (اختياري - يمكن التحقق محلياً)
                if (verifySignature(uid, timestamp, signature)) {
                    console.log('✅ التوقيع صحيح');
                    
                    // تسجيل الدخول تلقائياً
                    currentUser = {
                        id: parseInt(uid),
                        first_name: 'مستخدم ' + uid,
                        username: 'user_' + uid
                    };
                    
                    displayUserInfo(currentUser);
                    getBalance();
                    showSuccess('✅ تم تسجيل الدخول عبر الرابط الآمن');
                    
                } else {
                    console.log('❌ التوقيع غير صحيح');
                    showError('❌ الرابط غير صحيح أو منتهي الصلاحية');
                }
            } else {
                console.log('⚠️ لا يوجد توقيع في الرابط - وضع تجريبي');
                showError('⚠️ افتح التطبيق من بوت تيليجرام للتجربة الكاملة');
                
                // مستخدم تجريبي
                currentUser = {
                    id: 12345,
                    first_name: 'زائر',
                    username: 'guest'
                };
                displayUserInfo(currentUser);
            }
        }
        
        // ===== 5️⃣ التحقق من التوقيع محلياً =====
        function verifySignature(uid, timestamp, signature) {
            // التحقق من أن التوقيع ليس منتهي الصلاحية (24 ساعة)
            const now = Math.floor(Date.now() / 1000);
            const linkTime = parseInt(timestamp);
            
            if (now - linkTime > 86400) { // 24 ساعة
                console.log('⚠️ الرابط منتهي الصلاحية');
                return false;
            }
            
            // يمكن إضافة تحقق HMAC هنا
            // لكن الأفضل إرساله للسيرفر للتحقق
            
            return true;
        }
        
        // ===== عرض معلومات المستخدم =====
        function displayUserInfo(user) {
            if (!user) return;
            
            document.getElementById('userInfo').classList.remove('hidden');
            document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('userId').textContent = user.id;
        }
        
        // ===== جلب الرصيد =====
        async function getBalance() {
            if (!currentUser || !currentUser.id) {
                showError('❌ يرجى تسجيل الدخول أولاً');
                return;
            }
            
            try {
                showLoading(true);
                
                const response = await fetch(`${API_URL}/api/lucky/balance`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        init_data: window.Telegram?.WebApp?.initData || '',
                        signature: localStorage.getItem('lucky_signature') || ''
                    })
                });
                
                const data = await response.json();
                
                if (data && data.balance !== undefined) {
                    document.getElementById('balance').textContent = data.balance.toLocaleString();
                    console.log('💰 الرصيد:', data.balance);
                } else {
                    showError('❌ فشل جلب الرصيد');
                }
                
            } catch (error) {
                console.error('❌ خطأ في جلب الرصيد:', error);
                showError('❌ خطأ في الاتصال بالسيرفر');
            } finally {
                showLoading(false);
            }
        }
        
        // ===== لف العجلة =====
        async function spinWheel() {
            if (!currentUser || !currentUser.id) {
                showError('❌ يرجى تسجيل الدخول أولاً');
                return;
            }
            
            try {
                showLoading(true);
                document.getElementById('result').classList.add('hidden');
                
                const response = await fetch(`${API_URL}/api/lucky/spin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        init_data: window.Telegram?.WebApp?.initData || ''
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                // عرض النتيجة
                document.getElementById('result').classList.remove('hidden');
                
                if (data.won) {
                    document.getElementById('resultText').textContent = 
                        `🎉 مبروك! ربحت ${data.prize} نقطة!`;
                    document.getElementById('resultText').style.color = '#51cf66';
                } else {
                    document.getElementById('resultText').textContent = 
                        '😢 حظ أوفر المرة الجاية';
                    document.getElementById('resultText').style.color = '#ff6b6b';
                }
                
                // تحديث الرصيد
                if (data.new_balance !== undefined) {
                    document.getElementById('balance').textContent = data.new_balance.toLocaleString();
                }
                
            } catch (error) {
                console.error('❌ خطأ في لف العجلة:', error);
                showError('❌ خطأ في الاتصال');
            } finally {
                showLoading(false);
            }
        }
        
        // ===== دوال مساعدة =====
        function showLoading(show) {
            const loader = document.getElementById('loading');
            if (show) {
                loader.classList.remove('hidden');
            } else {
                loader.classList.add('hidden');
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 3000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.classList.remove('hidden');
            setTimeout(() => successDiv.classList.add('hidden'), 3000);
        }
        
        // ===== بدء التطبيق =====
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 بدء تطبيق Lucky...');
            checkTelegramWebApp();
        });
        
        // ===== تحديث تلقائي للرصيد كل 30 ثانية =====
        setInterval(() => {
            if (currentUser) {
                getBalance();
            }
        }, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🎰 لعبة الحظ - هدية يومية</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 40px;
    }

    .header {
      width: 100%; max-width: 400px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .header-title { font-size: 17px; font-weight: 700; }
    .balance-box {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }

    /* ===== Daily Gift Button ===== */
    .daily-section {
      width: 100%; max-width: 400px;
      margin-top: 12px;
    }
    .daily-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(135deg, #8e44ad, #9b59b6);
      color: #fff;
      box-shadow: 0 4px 15px rgba(142,68,173,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .daily-btn:active { transform: scale(0.97); }
    .daily-btn:disabled {
      background: linear-gradient(135deg, #444, #666);
      color: #999;
      box-shadow: none;
      cursor: not-allowed;
    }
    .daily-btn .sub { font-size: 12px; opacity: 0.7; font-weight: 400; }
    .daily-btn .icon { font-size: 24px; }

    /* ===== Wheel ===== */
    .wheel-wrapper {
      position: relative;
      width: 260px; height: 260px;
      margin-top: 18px;
    }
    .needle {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 28px solid #ffd200;
      filter: drop-shadow(0 0 6px #ffd200);
      z-index: 10;
    }
    #wheel { width: 260px; height: 260px; border-radius: 50%; box-shadow: 0 0 30px rgba(255,210,0,0.2); }
    .wheel-center {
      position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
      width: 44px; height: 44px;
      background: radial-gradient(circle, #ffd200, #f7971e);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 15px rgba(255,210,0,0.8);
      z-index: 5;
    }

    .stats-row {
      display: flex; gap: 10px;
      margin-top: 14px;
      width: 100%; max-width: 400px;
    }
    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 8px 4px;
      text-align: center;
    }
    .stat-label { font-size: 9px; color: rgba(255,255,255,0.5); }
    .stat-value { font-size: 14px; font-weight: 700; margin-top: 2px; }

    .stake-section { margin-top: 14px; width: 100%; max-width: 400px; }
    .stake-label { text-align: center; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .stakes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .stake-btn {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 9px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stake-btn.active { border-color: #ffd200; box-shadow: 0 0 12px rgba(255,210,0,0.3); transform: scale(1.04); }

    .spin-btn {
      margin-top: 14px;
      width: 100%; max-width: 400px;
      padding: 14px;
      font-size: 16px; font-weight: 800;
      border: none; border-radius: 14px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(247,151,30,0.4);
      transition: all 0.2s;
    }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { background: #444; color: #888; box-shadow: none; }

    .result {
      display: none;
      width: 100%; max-width: 400px;
      margin-top: 12px;
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      animation: fadeUp 0.3s ease;
    }
    .result.show { display: block; }
    .result.win { background: rgba(39,174,96,0.2); border: 2px solid #27ae60; }
    .result.lose { background: rgba(231,76,60,0.2); border: 2px solid #e74c3c; }
    .result.retry { background: rgba(52,152,219,0.2); border: 2px solid #3498db; }
    .res-icon { font-size: 36px; }
    .res-title { font-size: 18px; font-weight: 800; margin: 4px 0; }
    .res-sub { font-size: 12px; opacity: 0.8; }

    .cd-wrap {
      width: 100%; max-width: 400px;
      margin-top: 6px; height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px; overflow: hidden;
      display: none;
    }
    .cd-bar {
      height: 100%;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border-radius: 10px; width: 100%;
      transition: width linear;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      padding: 10px 22px; border-radius: 12px;
      font-size: 13px; font-weight: 600;
      z-index: 999; display: none;
      text-align: center;
      max-width: 90%;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .toast.show { display: block; }
    .toast.success { border-color: #27ae60; color: #2ecc71; }
    .toast.error { border-color: #e74c3c; color: #e74c3c; }

    @keyframes fadeUp {
      from { opacity:0; transform: translateX(-50%) translateY(15px); }
      to { opacity:1; transform: translateX(-50%) translateY(0); }
    }

    .confetti-piece {
      position: fixed; width: 8px; height: 12px; top: -20px;
      border-radius: 2px;
      animation: fall linear forwards;
      z-index: 200;
    }
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .spinning { animation: glowRing 0.4s ease-in-out infinite alternate; }
    @keyframes glowRing {
      from { filter: drop-shadow(0 0 10px rgba(255,210,0,0.3)); }
      to { filter: drop-shadow(0 0 30px rgba(255,210,0,0.9)); }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-title">🎰 لعبة الحظ</span>
  <div class="balance-box" id="balance" onclick="refreshBalance()">💰 تحميل...</div>
</div>

<!-- ===== Daily Gift Button ===== -->
<div class="daily-section">
  <button class="daily-btn" id="dailyBtn" onclick="claimDailyGift()">
    <span class="icon">🎁</span>
    <span>الهدية اليومية <span class="sub">(100 نقطة)</span></span>
  </button>
</div>

<!-- Wheel -->
<div class="wheel-wrapper">
  <div class="needle"></div>
  <canvas id="wheel" width="260" height="260"></canvas>
  <div class="wheel-center">🎯</div>
</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat-box"><div class="stat-label">الجولات</div><div class="stat-value" id="plays">0</div></div>
  <div class="stat-box"><div class="stat-label">فوز</div><div class="stat-value" style="color:#2ecc71" id="wins">0</div></div>
  <div class="stat-box"><div class="stat-label">خسارة</div><div class="stat-value" style="color:#e74c3c" id="loses">0</div></div>
</div>

<!-- Stakes -->
<div class="stake-section">
  <div class="stake-label">💰 اختر الرهان</div>
  <div class="stakes-grid" id="stakes"></div>
</div>

<!-- Spin -->
<button class="spin-btn" id="spinBtn" onclick="spin()">🎰 ادور العجلة</button>
<div class="cd-wrap" id="cdWrap"><div class="cd-bar" id="cdBar"></div></div>

<!-- Result -->
<div class="result" id="result">
  <div class="res-icon" id="resIcon">🎉</div>
  <div class="res-title" id="resTitle">مبروك!</div>
  <div class="res-sub" id="resSub"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const API = "https://bot.tota.click";
const STAKES = [5, 10, 25, 50, 100, 250];
const COOLDOWN = 3;

const tg = window.Telegram?.WebApp;
const initData = tg?.initData || "";

if (tg) { tg.ready(); tg.expand(); }

// ===== STATE =====
let balance = 0;
let stake = 5;
let spinning = false;
let rotation = 0;
let plays = 0, wins = 0, loses = 0;

// ===== HELPERS =====
function fmt(n) { return Number(n || 0).toLocaleString('ar') + ' نقطة'; }

function authFetch(url, opts = {}) {
  if (!opts.headers) opts.headers = {};
  opts.headers['X-Tg-Init'] = initData;
  return fetch(url, opts);
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== BALANCE =====
async function refreshBalance() {
  if (!initData) return;
  try {
    const r = await authFetch(`${API}/api/lucky/balance`);
    const d = await r.json();
    if (d.balance !== undefined) {
      balance = d.balance;
      document.getElementById('balance').textContent = '💰 ' + fmt(balance);
    }
  } catch(e) {}
}

// ===== DAILY GIFT =====
async function claimDailyGift() {
  if (!initData) {
    toast('افتح اللعبة من البوت', 'error');
    return;
  }

  const btn = document.getElementById('dailyBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ جاري التحقق...';

  try {
    // محاولة POST أولاً
    let response = await authFetch(`${API}/api/lucky/daily_gift`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData })
    });
    let data = await response.json();

    // إذا فشل POST، جرب GET
    if (data.error) {
      response = await authFetch(`${API}/api/lucky/daily_gift?init_data=${encodeURIComponent(initData)}`);
      data = await response.json();
    }

    if (data.error) {
      // رسائل الخطأ المعروفة
      if (data.error === 'already_claimed') {
        btn.innerHTML = '⏳ تم الحصول عليها اليوم';
        toast('حصلت على الهدية اليوم! عد غداً', 'error');
      } else if (data.error === 'not_authorized') {
        btn.innerHTML = '🔒 غير مصرح';
        toast('افتح اللعبة من البوت', 'error');
      } else {
        btn.innerHTML = '❌ فشل';
        toast(data.error || 'حدث خطأ', 'error');
      }
      btn.disabled = true;
      return;
    }

    // نجاح ✅
    const amount = data.amount || 100;
    btn.innerHTML = `✅ تم الاستلام! (+${amount})`;
    toast(`🎁 حصلت على ${fmt(amount)}!`, 'success');
    refreshBalance();

    // تعطيل الزر لمدة 24 ساعة
    setTimeout(() => {
      btn.innerHTML = '⏳ انتظر للغد';
      btn.disabled = true;
    }, 3000);

  } catch(e) {
    btn.innerHTML = '❌ خطأ';
    toast('تعذّر الاتصال بالسيرفر', 'error');
    btn.disabled = false;
  }
}

// ===== WHEEL =====
const SEGS = [
  { label:'🏆 فوز', color:'#1e8449', light:'#27ae60' },
  { label:'❌ خسارة', color:'#922b21', light:'#c0392b' },
  { label:'🔁 إعادة', color:'#1a5276', light:'#2980b9' },
  { label:'🏆 فوز', color:'#27ae60', light:'#2ecc71' },
  { label:'❌ خسارة', color:'#c0392b', light:'#e74c3c' },
  { label:'🔁 إعادة', color:'#1a5276', light:'#2980b9' },
];
const N = SEGS.length;
const SA = 360 / N;
const cvs = document.getElementById('wheel');
const ctx = cvs.getContext('2d');
const CX = cvs.width/2, CY = cvs.height/2, R = CX - 5;

function drawWheel(rot) {
  ctx.clearRect(0,0,cvs.width,cvs.height);
  const off = (rot - 90) * Math.PI / 180;

  SEGS.forEach((s,i) => {
    const st = off + i * SA * Math.PI/180;
    const en = st + SA * Math.PI/180;
    const g = ctx.createRadialGradient(CX,CY,R*0.15,CX,CY,R);
    g.addColorStop(0, s.light); g.addColorStop(1, s.color);
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,st,en); ctx.closePath();
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2; ctx.stroke();
  });

  SEGS.forEach((s,i) => {
    const mid = off + i * SA * Math.PI/180 + (SA/2) * Math.PI/180;
    const tr = R * 0.7;
    ctx.save();
    ctx.translate(CX + Math.cos(mid)*tr, CY + Math.sin(mid)*tr);
    ctx.rotate(mid + Math.PI/2);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const parts = s.label.split(' ');
    ctx.font = 'bold 13px Arial';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
    ctx.strokeText(parts.slice(1).join(' '), 0, 4);
    ctx.fillStyle = '#fff';
    ctx.fillText(parts.slice(1).join(' '), 0, 4);
    ctx.font = '12px Arial';
    ctx.fillStyle = '#fff';
    ctx.fillText(parts[0], 0, -10);
    ctx.restore();
  });

  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(255,210,0,0.5)';
  ctx.lineWidth = 4; ctx.stroke();
}
drawWheel(0);

// ===== STAKES =====
const stakeGrid = document.getElementById('stakes');
STAKES.forEach(s => {
  const b = document.createElement('button');
  b.className = 'stake-btn' + (s === stake ? ' active' : '');
  b.textContent = s;
  b.onclick = () => {
    document.querySelectorAll('.stake-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    stake = s;
  };
  stakeGrid.appendChild(b);
});

// ===== AUDIO =====
const ac = new (window.AudioContext || window.webkitAudioContext)();

function tick() {
  try {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = 600;
    g.gain.setValueAtTime(0.08, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.04);
    o.start(); o.stop(ac.currentTime + 0.04);
  } catch(e) {}
}

function winSound() {
  try {
    [523, 659, 784].forEach((f,i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      const t = ac.currentTime + i * 0.1;
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.start(t); o.stop(t + 0.25);
    });
  } catch(e) {}
}

function loseSound() {
  try {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sawtooth'; o.frequency.value = 250;
    g.gain.setValueAtTime(0.12, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
    o.start(); o.stop(ac.currentTime + 0.3);
  } catch(e) {}
}

// ===== CONFETTI =====
function confetti() {
  const colors = ['#ffd200','#27ae60','#3498db','#e74c3c','#9b59b6'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 6) + 'px';
    el.style.height = (10 + Math.random() * 6) + 'px';
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 5000);
  }
}

// ===== RESULT =====
function showResult(type, icon, title, sub) {
  const el = document.getElementById('result');
  el.className = 'result show ' + type;
  document.getElementById('resIcon').textContent = icon;
  document.getElementById('resTitle').textContent = title;
  document.getElementById('resSub').textContent = sub;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== SPIN =====
async function spin() {
  if (spinning) return;
  if (!initData) { toast('افتح اللعبة من البوت', 'error'); return; }

  const now = Date.now();
  const last = parseInt(localStorage.getItem('_ls') || '0');
  if (now - last < COOLDOWN * 1000) {
    const rem = Math.ceil((COOLDOWN * 1000 - (now - last)) / 1000);
    toast(`انتظر ${rem} ثانية`, 'error');
    return;
  }

  if (ac.state === 'suspended') ac.resume();

  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('result').className = 'result';
  document.getElementById('wheel').classList.add('spinning');

  let data;
  try {
    const r = await fetch(`${API}/api/lucky/play`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ init_data: initData, stake })
    });
    data = await r.json();
  } catch(e) {
    data = { error: 'network' };
  }

  if (data.error) {
    document.getElementById('wheel').classList.remove('spinning');
    toast(data.error || 'خطأ', 'error');
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    return;
  }

  localStorage.setItem('_ls', Date.now().toString());

  const segMap = { win: [0,2,4], lose: [1,3,5], retry: [2,5] };
  const opts = segMap[data.outcome] || [0];
  const target = opts[Math.floor(Math.random() * opts.length)];

  let stop = ((360 - (target + 0.5) * SA) % 360 + 360) % 360;

  if (data.outcome === 'lose') {
    const offset = SA * 0.25;
    stop = ((stop + offset) % 360 + 360) % 360;
  }

  const cur = ((rotation % 360) + 360) % 360;
  let diff = (stop - cur + 360) % 360;
  if (diff < 30) diff += 360;
  const final = rotation + 5 * 360 + diff;

  const dur = 3500;
  const start = performance.now();
  const startRot = rotation;
  let lastSeg = -1;

  await new Promise(resolve => {
    function frame(t) {
      const p = Math.min((t - start) / dur, 1);
      const e = 1 - Math.pow(1 - p, 4);
      rotation = startRot + (final - startRot) * e;
      drawWheel(rotation % 360);

      const segNow = Math.floor(((rotation % 360) / 360) * N);
      if (segNow !== lastSeg) { tick(); lastSeg = segNow; }

      if (p < 1) requestAnimationFrame(frame);
      else { rotation = final; drawWheel(rotation % 360); resolve(); }
    }
    requestAnimationFrame(frame);
  });

  document.getElementById('wheel').classList.remove('spinning');

  refreshBalance();
  plays++;
  if (data.outcome === 'win') { wins++; winSound(); confetti(); showResult('win','🎉','فوز!', `+${data.earned} نقطة`); }
  else if (data.outcome === 'lose') { loses++; loseSound(); showResult('lose','😢','خسارة!', `-${Math.abs(data.earned)} نقطة`); }
  else { showResult('retry','🔄','إعادة!', 'لا خصم ولا إضافة'); }

  document.getElementById('plays').textContent = plays;
  document.getElementById('wins').textContent = wins;
  document.getElementById('loses').textContent = loses;

  const wrap = document.getElementById('cdWrap');
  const bar = document.getElementById('cdBar');
  wrap.style.display = 'block';
  bar.style.transition = 'none'; bar.style.width = '100%';
  setTimeout(() => { bar.style.transition = `width ${COOLDOWN}s linear`; bar.style.width = '0%'; }, 50);
  setTimeout(() => {
    spinning = false;
    document.getElementById('spinBtn').disabled = false;
    wrap.style.display = 'none';
    bar.style.width = '100%';
  }, COOLDOWN * 1000);
}

// ===== PRESENCE =====
function pingPresence() {
  if (!initData) return;
  authFetch(`${API}/api/lucky/ping`).catch(() => {});
}

pingPresence();
setInterval(pingPresence, 60000);

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    if (!initData) return;
    const blob = new Blob([JSON.stringify({ init_data: initData })], { type: 'application/json' });
    try { navigator.sendBeacon(`${API}/api/lucky/leave`, blob); } catch(e) {}
  }
  if (document.visibilityState === 'visible') pingPresence();
});

// ===== INIT =====
refreshBalance();
</script>
</body>
</html>

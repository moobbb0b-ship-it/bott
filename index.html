<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 سباق التكرار السريع</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b0a1a, #1a1735);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: rgba(20, 18, 45, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 36px;
      padding: 24px 20px 30px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 4px; }
    .sub { color: #aaa; font-size: 14px; margin-bottom: 20px; border-bottom: 1px dashed #333; padding-bottom: 12px; }
    .balance-box {
      background: #0d0b1e;
      padding: 12px 14px;
      border-radius: 60px;
      border: 1px solid #ffd70044;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      font-weight: 700;
      font-size: 20px;
    }
    .balance-box span { color: #ffd700; }
    .stake-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 16px 0;
    }
    .stake-btn {
      background: #1e1b3a;
      border: 2px solid #2f2b55;
      color: #ccc;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }
    .stake-btn.active {
      border-color: #ffd700;
      background: #2f2b55;
      color: #ffd700;
      box-shadow: 0 0 12px #ffd70033;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      border: none;
      border-radius: 60px;
      color: #111;
      box-shadow: 0 6px 20px #ffd70055;
      cursor: pointer;
      transition: 0.15s;
      margin: 10px 0;
      letter-spacing: 0.5px;
    }
    .btn-primary:active { transform: scale(0.96); }
    .btn-primary:disabled { opacity: 0.5; filter: grayscale(0.6); transform: none; cursor: not-allowed; }
    .multi-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 12px 0 6px;
    }
    .multi-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #13112b;
      padding: 8px 14px;
      border-radius: 40px;
      border: 1px solid #2a274a;
    }
    .multi-row label {
      font-size: 14px;
      font-weight: 600;
      color: #bbb;
    }
    .multi-row input[type="range"] {
      width: 130px;
      accent-color: #ffd700;
      background: #2a274a;
      height: 4px;
      border-radius: 10px;
    }
    .multi-row .value {
      font-weight: 700;
      color: #ffd700;
      min-width: 28px;
    }
    .log-area {
      margin-top: 16px;
      background: #0d0b1e;
      border-radius: 20px;
      padding: 10px 14px;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #2a274a;
      font-size: 12px;
      text-align: left;
      direction: ltr;
      font-family: 'Consolas', monospace;
      color: #aaf0c0;
    }
    .log-area .win  { color: #4cdf8b; }
    .log-area .lose { color: #f26b6b; }
    .log-area .retry{ color: #f5b85b; }
    .log-area .info { color: #88b8ff; }
    .clear-log {
      background: transparent;
      border: 1px solid #3a365a;
      color: #888;
      padding: 4px 16px;
      border-radius: 30px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 6px;
      transition: 0.2s;
    }
    .clear-log:hover { background: #2a274a; color: #ddd; }
    .badge {
      display: inline-block;
      background: #1f1c40;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 12px;
      color: #aaa;
      margin-top: 6px;
    }
    .footer-note { color: #555; font-size: 11px; margin-top: 12px; border-top: 1px solid #1f1c40; padding-top: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚡🌀</div>
  <div class="sub">سباق التكرار السريع • Turbo Multi-Spin</div>

  <div class="balance-box">
    💰 <span id="balanceDisplay">10000</span>
  </div>

  <!-- اختيار الرهان -->
  <div class="stake-row" id="stakeContainer">
    <button class="stake-btn active" data-stake="250">250</button>
    <button class="stake-btn" data-stake="500">500</button>
    <button class="stake-btn" data-stake="1000">1K</button>
    <button class="stake-btn" data-stake="2500">2.5K</button>
    <button class="stake-btn" data-stake="5000">5K</button>
  </div>

  <!-- تحكم التكرار -->
  <div class="multi-options">
    <div class="multi-row">
      <label>🔁 عدد التكرارات</label>
      <input type="range" id="spinCountSlider" min="3" max="25" value="10">
      <span class="value" id="spinCountLabel">10</span>
    </div>
    <div class="multi-row">
      <label>🎲 تأخير عشوائي (ms)</label>
      <input type="range" id="delaySlider" min="0" max="80" value="18">
      <span class="value" id="delayLabel">18</span>
    </div>
  </div>

  <button class="btn-primary" id="spinBtn">🚀 إطلاق التكرار</button>

  <!-- سجل النتائج -->
  <div class="log-area" id="logArea">
    <div class="info">⚡ جاهز لسباق التكرارات ...</div>
  </div>
  <button class="clear-log" id="clearLogBtn">🧹 مسح السجل</button>
  <div class="badge" id="statusBadge">🟢 نشط</div>
  <div class="footer-note">✨ يتم إرسال الطلبات بشكل متوازي · Race Condition</div>
</div>

<script>
  (function(){
    // ------------------------------------------------
    // محاكاة الخادم + حالة اللعبة (لإظهار الثغرة)
    // ------------------------------------------------
    const SERVER = {
      // الرصيد الافتراضي
      _balance: 10000,
      // قفل المحاكاة (cooldown)
      _cooldownUntil: 0,
      // سجل العمليات (لمنع الغش في المحاكاة)
      _pending: 0,

      // محاكاة طلب الدوران
      spin: function(stake) {
        return new Promise((resolve) => {
          // محاكاة زمن استجابة عشوائي (15~45ms)
          const latency = 15 + Math.random() * 30;
          setTimeout(() => {
            // 1. التحقق من الرصيد
            if (this._balance < stake) {
              resolve({ outcome: 'lose', earned: 0, newBalance: this._balance, error: 'insufficient' });
              return;
            }
            // 2. محاكاة الخادم: فرصة 48% فوز ، 48% خسارة ، 4% إعادة
            const rand = Math.random();
            let outcome, earned;
            if (rand < 0.48) {
              outcome = 'win';
              earned = stake * (0.8 + Math.random() * 0.6); // 0.8 ~ 1.4x
              earned = Math.floor(earned);
            } else if (rand < 0.96) {
              outcome = 'lose';
              earned = -stake;
            } else {
              outcome = 'retry';
              earned = 0;
            }
            // تحديث الرصيد (محاكاة)
            this._balance += earned;
            // منع الرصيد السالب (في حالة الخسارة)
            if (this._balance < 0) this._balance = 0;

            resolve({
              outcome: outcome,
              earned: earned,
              newBalance: this._balance,
              error: null
            });
          }, latency);
        });
      },

      // إعادة ضبط الرصيد (للتجربة)
      resetBalance: function(amount) {
        this._balance = amount;
      },

      getBalance: function() {
        return this._balance;
      }
    };

    // -------------------------------------------------
    // عناصر DOM
    // -------------------------------------------------
    const balanceSpan = document.getElementById('balanceDisplay');
    const spinBtn = document.getElementById('spinBtn');
    const logArea = document.getElementById('logArea');
    const statusBadge = document.getElementById('statusBadge');
    const clearLogBtn = document.getElementById('clearLogBtn');

    // عناصر الرهان
    const stakeBtns = document.querySelectorAll('.stake-btn');
    let currentStake = 250;

    // عناصر التكرار
    const spinCountSlider = document.getElementById('spinCountSlider');
    const spinCountLabel = document.getElementById('spinCountLabel');
    const delaySlider = document.getElementById('delaySlider');
    const delayLabel = document.getElementById('delayLabel');

    // حالة التشغيل
    let isRunning = false;

    // تحديث الرصيد في الواجهة
    function updateBalanceUI() {
      balanceSpan.textContent = SERVER.getBalance().toLocaleString('ar');
    }

    // إضافة سجل
    function addLog(message, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = message;
      logArea.appendChild(div);
      logArea.scrollTop = logArea.scrollHeight;
    }

    // مسح السجل
    function clearLog() {
      logArea.innerHTML = '';
      addLog('🧹 تم مسح السجل', 'info');
    }

    // تحديث حالة الزر
    function setRunningState(running) {
      isRunning = running;
      spinBtn.disabled = running;
      spinBtn.textContent = running ? '⏳ جاري الإطلاق...' : '🚀 إطلاق التكرار';
      statusBadge.textContent = running ? '🔄 قيد التشغيل' : '🟢 نشط';
      statusBadge.style.color = running ? '#ffd700' : '#7bed9f';
    }

    // ============================================================
    // الميزة الأساسية: Multi-Spin Race Condition
    // ============================================================
    async function launchMultiSpin() {
      if (isRunning) return;
      if (SERVER.getBalance() <= 0) {
        addLog('⚠️ الرصيد صفر! أعد ضبط الرصيد (F5 أو يدوياً)', 'lose');
        return;
      }

      // قراءة الإعدادات
      const spinCount = parseInt(spinCountSlider.value, 10);
      const baseDelay = parseInt(delaySlider.value, 10);
      const stake = currentStake;

      // تحقق من الرصيد يكفي للرهان المطلوب (لجميع التكرارات)
      // لكن في الثغرة نرسل كل الطلبات دفعة واحدة دون انتظار
      if (SERVER.getBalance() < stake) {
        addLog(`⚠️ الرصيد (${SERVER.getBalance()}) لا يكفي لرهان ${stake}`, 'lose');
        return;
      }

      // مسح أي بيانات محلية (محاكاة لمسح localStorage)
      try {
        localStorage.clear();
        sessionStorage.clear();
        addLog('🧹 تم مسح التخزين المحلي (localStorage/sessionStorage)', 'info');
      } catch(e) {}

      setRunningState(true);
      addLog(`⚡ إطلاق ${spinCount} طلب متوازي (رهان ${stake}) ...`, 'info');

      // ---------- بناء مصفوفة الطلبات ----------
      const requests = [];
      for (let i = 0; i < spinCount; i++) {
        // إضافة تأخير عشوائي صغير بين الطلبات (لكنها لا تزال متقاربة جداً)
        // هذا يساعد في خلق حالة سباق حقيقية
        const delayMs = baseDelay + Math.floor(Math.random() * 20);
        requests.push(
          new Promise((resolve) => {
            setTimeout(async () => {
              const result = await SERVER.spin(stake);
              resolve(result);
            }, delayMs);
          })
        );
      }

      // ---------- إرسال جميع الطلبات في نفس الوقت (متوازي) ----------
      const startTime = performance.now();
      // استخدم Promise.allSettled لتجميع النتائج حتى لو فشلت بعضها
      const results = await Promise.allSettled(requests);
      const elapsed = (performance.now() - startTime).toFixed(1);

      // معالجة النتائج
      let totalEarned = 0;
      let wins = 0, loses = 0, retries = 0, errors = 0;

      results.forEach((res, idx) => {
        if (res.status === 'fulfilled') {
          const data = res.value;
          if (data.error) {
            errors++;
            addLog(`[${idx+1}] ⛔ خطأ: ${data.error}`, 'lose');
            return;
          }
          totalEarned += data.earned;
          if (data.outcome === 'win') {
            wins++;
            addLog(`[${idx+1}] 🏆 فوز  +${data.earned}`, 'win');
          } else if (data.outcome === 'lose') {
            loses++;
            addLog(`[${idx+1}] ❌ خسارة ${data.earned}`, 'lose');
          } else {
            retries++;
            addLog(`[${idx+1}] 🔁 إعادة  0`, 'retry');
          }
        } else {
          errors++;
          addLog(`[${idx+1}] 💥 فشل الطلب`, 'lose');
        }
      });

      // تحديث الرصيد النهائي (في المحاكاة تم تحديثه أثناء المعالجة)
      // لكن نقرأ الرصيد من الخادم المحاكي
      updateBalanceUI();

      // ملخص
      const net = totalEarned;
      const summary = `⏱️ ${elapsed}ms • فوز ${wins} • خسارة ${loses} • إعادة ${retries} • صافي ${net > 0 ? '+' : ''}${net}`;
      addLog(`📊 ${summary}`, 'info');
      addLog(`💰 الرصيد الجديد: ${SERVER.getBalance().toLocaleString('ar')}`, 'info');

      // إذا كان الرصيد صفراً ننبه
      if (SERVER.getBalance() === 0) {
        addLog('💀 الرصيد صفر! أعد الضبط', 'lose');
      }

      setRunningState(false);
    }

    // ============================================================
    // ربط الأحداث
    // ============================================================

    // زر الإطلاق
    spinBtn.addEventListener('click', launchMultiSpin);

    // اختيار الرهان
    stakeBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        stakeBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentStake = parseInt(this.dataset.stake, 10);
      });
    });

    // تحكم التكرار
    spinCountSlider.addEventListener('input', function() {
      spinCountLabel.textContent = this.value;
    });
    delaySlider.addEventListener('input', function() {
      delayLabel.textContent = this.value;
    });

    // مسح السجل
    clearLogBtn.addEventListener('click', clearLog);

    // إعادة ضبط الرصيد (مخفي لكن يمكن استدعاؤه من الكونسول)
    window.resetServerBalance = function(amount = 10000) {
      SERVER.resetBalance(amount);
      updateBalanceUI();
      addLog(`🔄 تم ضبط الرصيد إلى ${amount}`, 'info');
    };

    // بدء التشغيل
    updateBalanceUI();
    addLog('🚀 النظام جاهز · اضغط "إطلاق التكرار"', 'info');
    addLog('💡 ملاحظة: هذه محاكاة لثغرة سباق البيانات', 'info');

    // (اختياري) محاكاة أن السيرفر قد يعطي كولداون لكننا نتجاوزه بالتكرار
    // في الواقع الحقيقي يتم إرسال الطلبات قبل تحديث حالة الكولداون

    // استثناء: عرض حالة الرصيد كل ثانية (تحديث تلقائي)
    setInterval(() => {
      updateBalanceUI();
    }, 2000);

    // عند تغيير الرصيد من الخارج (مثلاً من الكونسول) نحدث الواجهة
    // لكننا نعتمد على التحديث الدوري.

    console.log('%c🔥 Multi-Spin Engine (Race Condition Demo)', 'font-size:18px; font-weight:bold; color:#ffd700;');
    console.log('⚠️ هذا العرض يوضح كيفية استغلال التزامن في الطلبات.');
    console.log('💡 استخدم resetServerBalance(amount) لإعادة ضبط الرصيد.');
  })();
</script>
</body>
</html>

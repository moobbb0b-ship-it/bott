<!-- v12.4 - Security & Points Fix -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🎰 لعبة الحظ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); font-family: 'Segoe UI', Arial, sans-serif; color: #fff; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; padding-bottom: 40px; }
    .header { width: 100%; padding: 16px 20px 12px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-title { font-size: 20px; font-weight: 700; }
    .balance-box { background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a1a; padding: 7px 16px; border-radius: 20px; font-weight: 800; font-size: 14px; cursor: pointer; }
    .tabs { display: flex; width: 92%; max-width: 380px; margin-top: 16px; background: rgba(255,255,255,0.06); border-radius: 14px; padding: 4px; gap: 4px; }
    .tab-btn { flex: 1; padding: 9px; border: none; border-radius: 11px; font-size: 13px; font-weight: 700; cursor: pointer; background: transparent; color: rgba(255,255,255,0.5); }
    .tab-btn.active { background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a1a; }
    .panel { display: none; width: 100%; flex-direction: column; align-items: center; }
    .panel.show { display: flex; }
    .wheel-section { margin-top: 20px; position: relative; }
    .wheel-wrapper { position: relative; width: 260px; height: 260px; }
    .needle { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 11px solid transparent; border-right: 11px solid transparent; border-top: 28px solid #ffd200; z-index: 10; }
    #wheel { width: 260px; height: 260px; border-radius: 50%; box-shadow: 0 0 30px rgba(255,210,0,0.25); }
    .wheel-center { position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); width: 46px; height: 46px; background: radial-gradient(circle, #ffd200, #f7971e); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 5; }
    .stats-row { display: flex; gap: 10px; margin-top: 16px; width: 92%; max-width: 380px; }
    .stat-box { flex: 1; background: rgba(255,255,255,0.06); border-radius: 12px; padding: 10px 6px; text-align: center; }
    .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); }
    .stat-value { font-size: 15px; font-weight: 700; }
    .stakes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; width: 92%; max-width: 380px; }
    .stake-btn { background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.13); border-radius: 12px; color: #fff; padding: 11px; cursor: pointer; font-weight: bold; }
    .stake-btn.active { border-color: #ffd200; background: rgba(255,210,0,0.1); }
    .spin-btn { margin-top: 20px; width: 92%; max-width: 380px; padding: 15px; font-size: 18px; font-weight: 800; border: none; border-radius: 16px; background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a1a; cursor: pointer; }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result-inline { display: none; width: 92%; max-width: 380px; margin-top: 14px; border-radius: 18px; padding: 20px; text-align: center; border: 2px solid transparent; }
    .result-inline.show { display: block; }
    .result-inline.win-res { background: rgba(39,174,96,0.2); border-color: #27ae60; }
    .result-inline.lose-res { background: rgba(231,76,60,0.2); border-color: #e74c3c; }
    .result-inline.retry-res { background: rgba(52,152,219,0.2); border-color: #3498db; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">🎰 لعبة الحظ</div>
    <div class="balance-box" id="balance-display" onclick="refreshBalance()">💰 0 نقطة</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('game', this)">🎮 اللعب</button>
    <button class="tab-btn" onclick="switchTab('stats', this)">📊 المتصدرون</button>
  </div>
  <div class="content" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    <div class="panel show" id="panel-game">
      <div class="wheel-section"><div class="wheel-wrapper"><div class="needle"></div><canvas id="wheel" width="260" height="260"></canvas><div class="wheel-center">🎡</div></div></div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-label">الجولات</div><div class="stat-value" id="st-plays">0</div></div>
        <div class="stat-box"><div class="stat-label">الفوز</div><div class="stat-value" id="st-wins" style="color:#2ecc71">0</div></div>
        <div class="stat-box"><div class="stat-label">الخسارة</div><div class="stat-value" id="st-loses" style="color:#e74c3c">0</div></div>
      </div>
      <div class="stakes-grid" id="stakes-grid"></div>
      <button class="spin-btn" id="spin-btn" onclick="startSpin()">🎰 ادور العجلة</button>
      <div class="result-inline" id="result-inline"><div id="res-icon" style="font-size:40px"></div><div id="res-title" style="font-size:20px; font-weight:bold"></div><div id="res-sub"></div></div>
    </div>
    <div class="panel" id="panel-stats" style="width: 92%; max-width: 380px; margin-top: 20px;">
      <h3>📊 المتصدرون</h3>
      <div id="winners-list" style="margin-top: 15px;"></div>
    </div>
  </div>
<script>
  const tg = window.Telegram?.WebApp;
  // رابط السيرفر الجديد
  const API = "https://5000-i5nm21p7k72sruii71ebj-5d89b684.us1.manus.computer"; 
  const STAKES = [250, 500, 750, 1000, 5000, 10000];
  const initData = tg?.initData || "";
  if (tg) { tg.ready(); tg.expand(); }

  let balance = 0, selectedStake = 500, isSpinning = false, rotation = 0, plays=0, wins=0, loses=0;

  async function authFetch(url, opts = {}) {
    if (!opts.headers) opts.headers = {};
    opts.headers['X-Tg-Init'] = initData;
    opts.headers['Content-Type'] = 'application/json';
    return fetch(url, opts);
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('show');
    btn.classList.add('active');
    if (name === 'stats') loadStats();
  }

  const SEGS = [{label:'فوز',c:'#1e8449'},{label:'خسارة',c:'#922b21'},{label:'إعادة',c:'#1a5276'},{label:'فوز',c:'#27ae60'},{label:'خسارة',c:'#c0392b'},{label:'إعادة',c:'#1a5276'}];
  const cvs = document.getElementById('wheel'), ctx = cvs.getContext('2d'), CX = 130, CY = 130, R = 125;
  function drawWheel(rot) {
    ctx.clearRect(0,0,260,260);
    const off = (rot - 90) * Math.PI / 180;
    SEGS.forEach((s,i) => {
      const st = off + i * (60 * Math.PI/180), en = st + (60 * Math.PI/180);
      ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,st,en); ctx.fillStyle = s.c; ctx.fill();
      ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
      ctx.save(); ctx.translate(CX+Math.cos(st+0.5)*R*0.7, CY+Math.sin(st+0.5)*R*0.7); ctx.rotate(st+0.5+Math.PI/2);
      ctx.textAlign='center'; ctx.fillStyle='white'; ctx.font='bold 12px Arial'; ctx.fillText(s.label,0,0); ctx.restore();
    });
  }
  drawWheel(0);

  const grid = document.getElementById('stakes-grid');
  STAKES.forEach(s => {
    const b = document.createElement('button'); b.className = 'stake-btn' + (s===selectedStake?' active':''); b.textContent = s;
    b.onclick = () => { document.querySelectorAll('.stake-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); selectedStake = s; };
    grid.appendChild(b);
  });

  async function refreshBalance() {
    try {
      const r = await authFetch(`${API}/api/lucky/balance`);
      const d = await r.json();
      if (d.balance !== undefined) { balance = d.balance; document.getElementById('balance-display').textContent = '💰 ' + balance.toLocaleString() + ' نقطة'; }
    } catch(e) { console.error("Balance Error:", e); }
  }

  async function startSpin() {
    if (isSpinning) return;
    isSpinning = true; document.getElementById('spin-btn').disabled = true;
    try {
      const r = await authFetch(`${API}/api/lucky/play`, { method: 'POST', body: JSON.stringify({ init_data: initData, stake: selectedStake }) });
      const data = await r.json();
      if (data.error) { alert("رصيدك غير كافٍ أو حدث خطأ"); isSpinning = false; document.getElementById('spin-btn').disabled = false; return; }
      const targetSeg = {win:0, lose:1, retry:2}[data.outcome];
      const finalRot = rotation + 360 * 5 + (360 - targetSeg * 60 - 30);
      const start = performance.now();
      function anim(now) {
        const p = Math.min((now - start) / 4000, 1), ease = 1 - Math.pow(1 - p, 3);
        rotation = rotation + (finalRot - rotation) * ease; drawWheel(rotation % 360);
        if (p < 1) requestAnimationFrame(anim);
        else {
          isSpinning = false; document.getElementById('spin-btn').disabled = false;
          refreshBalance();
          const res = document.getElementById('result-inline'); res.className = 'result-inline show ' + data.outcome + '-res';
          document.getElementById('res-icon').textContent = data.outcome === 'win' ? '🎉' : '😢';
          document.getElementById('res-title').textContent = data.outcome === 'win' ? 'مبروك فزت!' : 'حظ أوفر';
          document.getElementById('res-sub').textContent = `النتيجة: ${data.earned}`;
        }
      }
      requestAnimationFrame(anim);
    } catch(e) { alert("خطأ في الاتصال بالسيرفر"); isSpinning = false; document.getElementById('spin-btn').disabled = false; }
  }

  async function loadStats() {
    try {
      const r = await authFetch(`${API}/api/lucky/stats`);
      const d = await r.json();
      document.getElementById('winners-list').innerHTML = d.last10.map(w => `<div style="padding:10px; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:10px;">${w.name}: ${w.total_won} نقطة</div>`).join('');
    } catch(e) {}
  }

  refreshBalance();
</script>
</body>
</html>

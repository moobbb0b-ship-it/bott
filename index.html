<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🎰 لعبة الحظ - المتصدرون</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 40px;
    }

    /* ===== Header ===== */
    .header {
      width: 100%;
      padding: 16px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    .header-title { font-size: 20px; font-weight: 700; }
    .balance-box {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      padding: 7px 16px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .balance-box:active { transform: scale(0.95); }
    
    /* ===== PUBLIC LEADERBOARD - TOP RIGHT (دائماً ظاهرة للكل) ===== */
    .public-leaderboard {
      position: fixed;
      top: 70px;
      left: 12px;
      width: 240px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(14px);
      border-radius: 20px;
      border: 1px solid rgba(255,210,0,0.4);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      z-index: 100;
      overflow: hidden;
      transition: all 0.2s ease;
    }
    .leaderboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: linear-gradient(135deg, rgba(247,151,30,0.3), rgba(255,210,0,0.2));
      border-bottom: 1px solid rgba(255,210,0,0.3);
      cursor: pointer;
    }
    .leaderboard-header h4 {
      font-size: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .leaderboard-toggle {
      font-size: 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2px 8px;
    }
    .leaderboard-content {
      max-height: 340px;
      overflow-y: auto;
      transition: max-height 0.25s ease;
    }
    .leaderboard-content.collapsed {
      max-height: 0;
      padding: 0;
    }
    .leaderboard-list {
      padding: 8px 6px;
    }
    .lb-mini-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
    }
    .lb-mini-rank {
      width: 26px;
      font-weight: 800;
      font-size: 13px;
      color: #ffd200;
    }
    .lb-mini-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .lb-mini-points {
      font-weight: 700;
      color: #2ecc71;
      background: rgba(46,204,113,0.15);
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 11px;
    }
    .lb-footer {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .refresh-lb {
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .refresh-lb:active { background: rgba(255,255,255,0.2); }

    /* ===== Tabs ===== */
    .tabs {
      display: flex;
      width: 92%;
      max-width: 380px;
      margin-top: 16px;
      background: rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 11px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: rgba(255,255,255,0.5);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      box-shadow: 0 2px 10px rgba(247,151,30,0.4);
    }

    /* ===== Tab panels ===== */
    .panel { display: none; width: 100%; flex-direction: column; align-items: center; }
    .panel.show { display: flex; }

    /* ===== Particles ===== */
    #particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
    .content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; }

    /* ===== Wheel ===== */
    .wheel-section { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
    .wheel-wrapper { position: relative; width: 260px; height: 260px; }
    .needle {
      position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 28px solid #ffd200;
      filter: drop-shadow(0 0 6px #ffd200);
      z-index: 10;
    }
    #wheel {
      width: 260px; height: 260px;
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255,210,0,0.25), inset 0 0 20px rgba(0,0,0,0.3);
    }
    .wheel-center {
      position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
      width: 46px; height: 46px;
      background: radial-gradient(circle, #ffd200, #f7971e);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 15px rgba(255,210,0,0.8);
      z-index: 5;
    }

    /* ===== Stats mini row ===== */
    .stats-row {
      display: flex; gap: 10px;
      margin-top: 16px;
      width: 92%; max-width: 380px;
    }
    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
    }
    .stat-label { font-size: 10px; color: rgba(255,255,255,0.5); }
    .stat-value { font-size: 15px; font-weight: 700; margin-top: 3px; }

    /* ===== Stake picker ===== */
    .stake-section { margin-top: 18px; width: 92%; max-width: 380px; }
    .stake-label { text-align: center; font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 10px; }
    .stakes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stake-btn {
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.13);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 11px 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stake-btn.active {
      border-color: #ffd200;
      box-shadow: 0 0 14px rgba(255,210,0,0.35);
      transform: scale(1.04);
    }
    .stake-btn:active { transform: scale(0.95); }

    /* ===== Spin button ===== */
    .spin-btn {
      margin-top: 16px;
      width: 92%; max-width: 380px;
      padding: 15px;
      font-size: 17px; font-weight: 800;
      border: none; border-radius: 16px;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(247,151,30,0.45);
      transition: all 0.2s;
    }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled {
      background: linear-gradient(135deg, #444, #666);
      color: #999; cursor: not-allowed;
      box-shadow: none; transform: none;
    }

    /* ===== Cooldown bar ===== */
    .cd-wrap {
      width: 92%; max-width: 380px;
      margin-top: 10px; height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px; overflow: hidden;
      display: none;
    }
    .cd-bar {
      height: 100%;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      border-radius: 10px; width: 100%;
      transition: width linear;
    }

    /* ===== Result inline ===== */
    .result-inline {
      display: none;
      width: 92%; max-width: 380px;
      margin-top: 14px;
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      animation: slideIn 0.35s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .result-inline.win-res  { background: linear-gradient(135deg, rgba(39,174,96,0.25), rgba(46,204,113,0.1)); border: 2px solid #27ae60; }
    .result-inline.lose-res { background: linear-gradient(135deg, rgba(231,76,60,0.25),  rgba(192,57,43,0.1));  border: 2px solid #e74c3c; }
    .result-inline.retry-res{ background: linear-gradient(135deg, rgba(52,152,219,0.25), rgba(41,128,185,0.1)); border: 2px solid #3498db; }
    .result-inline.show { display: block; }
    .res-icon  { font-size: 50px; }
    .res-title { font-size: 22px; font-weight: 800; margin: 6px 0 4px; }
    .res-sub   { font-size: 14px; color: rgba(255,255,255,0.7); }

    /* ===== Stats panel (tab) ===== */
    .stats-panel { width: 92%; max-width: 400px; margin-top: 16px; }
    .stats-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .stats-header h3 { font-size: 16px; font-weight: 700; }
    .refresh-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 10px;
      color: #fff; padding: 6px 12px;
      font-size: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    .my-card {
      background: linear-gradient(135deg, rgba(247,151,30,0.18), rgba(255,210,0,0.10));
      border: 1px solid rgba(247,151,30,0.4);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .my-avatar {
      width: 62px; height: 62px;
      border-radius: 50%;
      border: 2.5px solid #ffd200;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.1);
    }
    .my-avatar-placeholder {
      width: 62px; height: 62px;
      border-radius: 50%;
      border: 2.5px solid #ffd200;
      background: linear-gradient(135deg,#f7971e,#ffd200);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
    }
    .my-info { flex: 1; min-width: 0; }
    .my-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .my-balance { font-size: 20px; font-weight: 800; color: #ffd200; margin-bottom: 6px; }
    .total-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .total-box-num { font-size: 24px; font-weight: 800; color: #ffd200; }
    .lb-title { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.75); margin-bottom: 10px; }
    .winners-list { display: flex; flex-direction: column; gap: 8px; }
    .winner-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .winner-rank { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
    .winner-avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .winner-info { flex: 1; }
    .winner-name { font-size: 13px; font-weight: 600; }
    .winner-pts  { font-size: 12px; font-weight: 700; color: #2ecc71; }
    .loading-txt { text-align: center; color: rgba(255,255,255,0.4); padding: 20px; font-size: 13px; }

    /* ===== Admin tab (مخفي إلا للمديرين) ===== */
    .admin-panel { width: 92%; max-width: 380px; margin-top: 16px; }
    .period-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .period-btn {
      flex: 1; min-width: 58px;
      padding: 8px 6px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      background: rgba(255,255,255,0.07);
      color: #fff; font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .period-btn.active {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
    }
    .admin-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .admin-stat-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 14px 10px; text-align: center;
    }
    .admin-card-num  { font-size: 17px; font-weight: 800; margin: 5px 0 3px; }
    .modal-overlay { position: fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); z-index:500; display:flex; align-items:center; justify-content:center; }
    .modal-overlay.hidden { display: none; }
    .modal-card { background: linear-gradient(145deg,#1e1b3a,#2d2b55); border-radius:22px; padding:20px; width:300px; }
    .confetti-piece { position: fixed; width:10px; height:14px; animation:confettiFall linear forwards; z-index:200; }
    @keyframes confettiFall { 100% { transform: translateY(110vh) rotate(720deg); opacity:0; } }
    .spinning { animation: glowRing 0.4s infinite alternate; }
    @keyframes glowRing { from { filter:drop-shadow(0 0 10px rgba(255,210,0,0.3)); } to { filter:drop-shadow(0 0 30px rgba(255,210,0,0.9)); } }
    @media (max-width: 560px) {
      .public-leaderboard { width: 210px; top: 65px; left: 8px; }
      .lb-mini-name { font-size: 10px; }
    }
  </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="header">
  <div class="header-title">🎰 لعبة الحظ</div>
  <div class="balance-box" id="balance-display" onclick="refreshBalance()">💰 تحميل...</div>
</div>

<!-- PUBLIC LEADERBOARD - للكل في أعلى اليمين (left عربي) -->
<div class="public-leaderboard" id="public-leaderboard">
  <div class="leaderboard-header" onclick="toggleLeaderboard()">
    <h4>🏆 ترتيب المتصدرين</h4>
    <div class="leaderboard-toggle" id="lb-toggle-arrow">▲</div>
  </div>
  <div class="leaderboard-content" id="lb-content">
    <div class="leaderboard-list" id="public-lb-list">
      <div class="loading-txt" style="padding:12px">⏳ جاري التحميل...</div>
    </div>
    <div class="lb-footer">
      <button class="refresh-lb" onclick="refreshPublicLeaderboard(event)">🔄 تحديث</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('game',this)">🎮 اللعبة</button>
    <button class="tab-btn" onclick="switchTab('stats',this)">📊 الإحصائيات</button>
    <button class="tab-btn" id="admin-tab-btn" style="display:none" onclick="switchTab('admin',this)">⚙️ إدارة</button>
  </div>

  <!-- GAME PANEL -->
  <div class="panel show" id="panel-game">
    <div class="wheel-section">
      <div class="wheel-wrapper">
        <div class="needle"></div>
        <canvas id="wheel" width="260" height="260"></canvas>
        <div class="wheel-center">🎯</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">الجولات</div><div class="stat-value" id="st-plays">0</div></div>
      <div class="stat-box"><div class="stat-label">الفوز</div><div class="stat-value" style="color:#2ecc71" id="st-wins">0</div></div>
      <div class="stat-box"><div class="stat-label">الخسارة</div><div class="stat-value" style="color:#e74c3c" id="st-loses">0</div></div>
    </div>
    <div class="stake-section">
      <div class="stake-label">💰 اختر مبلغ الرهان</div>
      <div class="stakes-grid" id="stakes-grid"></div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="startSpin()">🎰 ادور العجلة</button>
    <div class="cd-wrap" id="cd-wrap"><div class="cd-bar" id="cd-bar"></div></div>
    <div class="result-inline" id="result-inline">
      <div class="res-icon" id="res-icon">🎉</div>
      <div class="res-title" id="res-title">مبروك!</div>
      <div class="res-sub" id="res-sub"></div>
    </div>
  </div>

  <!-- ADMIN PANEL (للمديرين فقط) -->
  <div class="panel" id="panel-admin">
    <div class="admin-panel"><div class="stats-header"><h3>⚙️ لوحة الأدمن</h3><button class="refresh-btn" onclick="loadAdminStats()">🔄 تحديث</button></div>
    <div class="period-filters"><button class="period-btn active" data-period="TODAY" onclick="selectPeriod(this)">اليوم</button><button class="period-btn" data-period="YESTERDAY" onclick="selectPeriod(this)">البارحة</button><button class="period-btn" data-period="W7" onclick="selectPeriod(this)">7 أيام</button><button class="period-btn" data-period="ALL" onclick="selectPeriod(this)">الكل</button></div>
    <div class="admin-stat-grid"><div class="admin-stat-card"><div class="admin-card-num" id="adm-active-now">-</div><div>نشطون الآن</div></div><div class="admin-stat-card"><div class="admin-card-num" id="adm-active-today">-</div><div>نشطون اليوم</div></div></div>
    <div class="admin-stat-grid"><div class="admin-stat-card profit"><div class="admin-card-num" id="adm-profit" style="color:#2ecc71">-</div><div>أرباح البوت</div></div><div class="admin-stat-card loss"><div class="admin-card-num" id="adm-loss" style="color:#e74c3c">-</div><div>خسائر البوت</div></div></div>
    <div class="admin-stat-grid"><div class="admin-stat-card"><div class="admin-card-num" id="adm-net">-</div><div>الصافي</div></div><div class="admin-stat-card"><div class="admin-card-num" id="adm-games">-</div><div>الجولات</div></div></div>
    </div>
  </div>

  <!-- STATS PANEL -->
  <div class="panel" id="panel-stats">
    <div class="stats-panel">
      <div class="stats-header"><h3>📊 الإحصائيات</h3><button class="refresh-btn" onclick="loadStats()">🔄 تحديث</button></div>
      <div class="my-card" id="my-card"><div class="my-avatar-placeholder">⏳</div><div class="my-info"><div class="my-name">...</div><div class="my-balance">-</div></div></div>
      <div class="total-box"><div class="total-box-lbl">👥 إجمالي المشاركين</div><div class="total-box-num" id="stat-participants">-</div></div>
      <div class="lb-title">🏆 أكثر الفائزين</div>
      <div class="winners-list" id="winners-list"><div class="loading-txt">⏳ جاري التحميل...</div></div>
    </div>
  </div>
</div>
<div class="modal-overlay hidden" id="user-modal" onclick="closeUserModal(event)"><div class="modal-card"><button onclick="document.getElementById('user-modal').classList.add('hidden')" style="background:none;border:none;color:#fff;float:left">✕</button><div id="modal-info">...</div></div></div>

<script>
const tg = window.Telegram?.WebApp;
const API = "https://bot.tota.click";
const STAKES = [250, 500, 750, 1000, 5000, 10000];
const COOLDOWN = 3;
const initData = tg?.initData || "";
function authFetch(url, opts={}) { if(!opts.headers) opts.headers={}; opts.headers['X-Tg-Init']=initData; return fetch(url,opts); }

let balance=0, selectedStake=500, isSpinning=false, rotation=0, plays=0, wins=0, loses=0;
let isAdmin = false;
let currentPeriod='TODAY';

// ========== PUBLIC LEADERBOARD (للكل) ==========
let lbCollapsed = false;
function toggleLeaderboard() {
  const content = document.getElementById('lb-content');
  const arrow = document.getElementById('lb-toggle-arrow');
  lbCollapsed = !lbCollapsed;
  if(lbCollapsed) {
    content.classList.add('collapsed');
    arrow.innerHTML = '▼';
  } else {
    content.classList.remove('collapsed');
    arrow.innerHTML = '▲';
    refreshPublicLeaderboard();
  }
}
async function refreshPublicLeaderboard(event) {
  if(event) event.stopPropagation();
  const container = document.getElementById('public-lb-list');
  container.innerHTML = '<div class="loading-txt">⏳ جاري التحميل...</div>';
  try {
    // جلب قائمة الفائزين (أكثر ربح) من API العام
    const resp = await fetch(`${API}/api/lucky/stats`); // endpoint عام بدون صلاحية
    const data = await resp.json();
    let winners = [];
    if(data.last10 && Array.isArray(data.last10)) {
      winners = data.last10.slice(0,7);
    } else if(data.top_winners) { winners = data.top_winners.slice(0,7); }
    else { winners = []; }
    if(winners.length === 0) {
      container.innerHTML = '<div class="loading-txt" style="padding:8px">🏅 لا يوجد فائزون بعد</div>';
      return;
    }
    const medals = ["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣","7️⃣"];
    container.innerHTML = winners.map((w,i) => `
      <div class="lb-mini-item">
        <div class="lb-mini-rank">${medals[i] || '🏅'}</div>
        <div class="lb-mini-name">${escapeHTML(w.name || 'لاعب #'+w.uid)}</div>
        <div class="lb-mini-points">+${Number(w.total_won||0).toLocaleString('de-DE')}</div>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = '<div class="loading-txt">⚠️ خطأ بالتحميل</div>';
  }
}
function escapeHTML(str) { return String(str??'').replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;}); }

// ========== باقي دوال اللعبة ==========
function switchTab(name,btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('show');
  btn.classList.add('active');
  if(name==='stats') loadStats();
  if(name==='admin' && isAdmin) loadAdminStats();
}
const SEGS = [{label:'🏆 فوز',color:'#1e8449',light:'#27ae60'},{label:'❌ خسارة',color:'#7e2e2e',light:'#c0392b'},{label:'🔁 إعادة',color:'#1a5276',light:'#2980b9'},{label:'🏆 فوز',color:'#1e8449',light:'#2ecc71'},{label:'❌ خسارة',color:'#7e2e2e',light:'#e74c3c'},{label:'🔁 إعادة',color:'#1a5276',light:'#2980b9'}];
const N=6, SA=360/N;
const cvs=document.getElementById('wheel'), ctx=cvs.getContext('2d');
const CX=cvs.width/2, CY=cvs.height/2, R=CX-5;
function drawWheel(rot) {
  ctx.clearRect(0,0,cvs.width,cvs.height);
  const off = (rot-90)*Math.PI/180;
  SEGS.forEach((s,i)=>{
    const st=off+i*SA*Math.PI/180, en=st+SA*Math.PI/180;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,st,en); ctx.closePath();
    ctx.fillStyle=s.light; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2; ctx.stroke();
    const mid=st+SA/2*Math.PI/180, tr=R*0.68;
    ctx.save(); ctx.translate(CX+Math.cos(mid)*tr, CY+Math.sin(mid)*tr); ctx.rotate(mid+Math.PI/2);
    ctx.font='bold 12px Arial'; ctx.fillStyle='white'; ctx.shadowBlur=0;
    ctx.fillText(s.label,0,4); ctx.restore();
  });
}
drawWheel(0);
const gridDiv=document.getElementById('stakes-grid');
STAKES.forEach(s=>{let b=document.createElement('button');b.className='stake-btn'+(s===selectedStake?' active':'');b.textContent=s>=1000?(s/1000)+'K':s;b.onclick=()=>{document.querySelectorAll('.stake-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');selectedStake=s;};gridDiv.appendChild(b);});
function fmtPts(n){return Number(n||0).toLocaleString('de-DE')+' نقطة';}
function updateBalanceUI(v){balance=v;document.getElementById('balance-display').textContent='💰 '+fmtPts(v);}
async function refreshBalance(){if(!initData)return;try{const r=await authFetch(`${API}/api/lucky/balance`);const d=await r.json();if(d.balance!==undefined)updateBalanceUI(d.balance);}catch(e){}}
refreshBalance();
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
function playTick(){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=600;g.gain.setValueAtTime(0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.05);o.start();o.stop(audioCtx.currentTime+0.05);}
function playWin(){ [523,659,784].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=f;const t=audioCtx.currentTime+i*0.12;g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.3);o.start(t);o.stop(t+0.3);});}
function playLose(){ const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';o.frequency.value=300;g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.start();o.stop(audioCtx.currentTime+0.4);}
function playRetry(){ const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=440;g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);o.start();o.stop(audioCtx.currentTime+0.4);}
function launchConfetti(){for(let i=0;i<40;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=['#ffd200','#27ae60','#e74c3c'][Math.floor(Math.random()*3)];el.style.width=6+Math.random()*6+'px';el.style.height=8+Math.random()*8+'px';el.style.animationDuration=1.5+Math.random()*2+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}}
function showResult(type,icon,title,sub){const el=document.getElementById('result-inline');el.classList.remove('win-res','lose-res','retry-res');if(type==='win')el.classList.add('win-res');if(type==='lose')el.classList.add('lose-res');if(type==='retry')el.classList.add('retry-res');document.getElementById('res-icon').textContent=icon;document.getElementById('res-title').textContent=title;document.getElementById('res-sub').textContent=sub;el.classList.add('show');}
async function startSpin() {
  if(isSpinning||!initData){showResult('error','⚠️','افتح اللعبة من البوت','');return;}
  const now=Date.now(), lastSpin=parseInt(localStorage.getItem('_lgs')||'0');
  if(now-lastSpin<COOLDOWN*1000){const rem=Math.ceil((COOLDOWN*1000-(now-lastSpin))/1000);showResult('error','⏳','انتظر قليلاً',`بعد ${rem} ثانية`);return;}
  if(audioCtx.state==='suspended')audioCtx.resume();
  isSpinning=true; document.getElementById('spin-btn').disabled=true; cvs.classList.add('spinning');
  let data;
  try{const r=await fetch(`${API}/api/lucky/play`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({init_data:initData,stake:selectedStake})});data=await r.json();}catch(e){data={error:'network'};}
  if(data.error){cvs.classList.remove('spinning');showResult('error','⚠️','خطأ',data.error);isSpinning=false;document.getElementById('spin-btn').disabled=false;return;}
  localStorage.setItem('_lgs',Date.now().toString());
  const segOptions={win:[0,3],lose:[1,4],retry:[2,5]}; const targetSeg=segOptions[data.outcome][Math.floor(Math.random()*2)];
  let stopAngle=((360-(targetSeg+0.5)*SA)%360+360)%360;
  if(data.outcome==='lose'){stopAngle=(stopAngle+SA*0.28)%360;}
  let diff=(stopAngle-((rotation%360)+360)%360+360)%360; if(diff<45)diff+=360;
  const finalRot=rotation+4*360+diff, duration=3500, startTime=performance.now(), startRot=rotation;
  let lastSeg=-1;
  await new Promise(resolve=>{function frame(t){const p=Math.min((t-startTime)/duration,1),e=1-Math.pow(1-p,3);rotation=startRot+(finalRot-startRot)*e;drawWheel(rotation%360);const cs=Math.floor(((rotation%360)/360)*N);if(cs!==lastSeg){playTick();lastSeg=cs;}if(p<1)requestAnimationFrame(frame);else{rotation=finalRot;drawWheel(rotation%360);resolve();}}requestAnimationFrame(frame);});
  cvs.classList.remove('spinning');
  updateBalanceUI(data.new_balance); plays++; if(data.outcome==='win')wins++; if(data.outcome==='lose')loses++;
  document.getElementById('st-plays').textContent=plays; document.getElementById('st-wins').textContent=wins; document.getElementById('st-loses').textContent=loses;
  if(data.outcome==='win'){playWin();showResult('win','🎉','فوز!',`ربحت +${data.earned.toLocaleString('ar')}`);launchConfetti();}
  else if(data.outcome==='lose'){playLose();showResult('lose','😢','خسارة',`خسرت ${Math.abs(data.earned).toLocaleString('ar')}`);}
  else{playRetry();showResult('retry','🔁','إعادة','لا خصم');}
  const wrap=document.getElementById('cd-wrap'),bar=document.getElementById('cd-bar');wrap.style.display='block';bar.style.transition='none';bar.style.width='100%';
  setTimeout(()=>{bar.style.transition=`width ${COOLDOWN}s linear`;bar.style.width='0%';},20);
  setTimeout(()=>{isSpinning=false;document.getElementById('spin-btn').disabled=false;wrap.style.display='none';bar.style.width='100%';},COOLDOWN*1000);
}
async function loadStats() {
  if(!initData)return;
  try{const me=await (await authFetch(`${API}/api/lucky/me`)).json();document.getElementById('my-card').innerHTML=`<div class="my-avatar-placeholder">🎮</div><div class="my-info"><div class="my-name">${escapeHTML(me.name||'لاعب')}</div><div class="my-balance">${fmtPts(me.balance)}</div></div>`;}catch(e){}
  try{const stats=await (await authFetch(`${API}/api/lucky/stats`)).json();document.getElementById('stat-participants').textContent=stats.participants||0; const listDiv=document.getElementById('winners-list'); if(stats.last10&&stats.last10.length){listDiv.innerHTML=stats.last10.slice(0,10).map((w,i)=><div class="winner-item"><span class="winner-rank">${['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'][i]||'🏅'}</span><div class="winner-info"><div class="winner-name">${escapeHTML(w.name||'لاعب')}</div><div class="winner-pts">+${Number(w.total_won||0).toLocaleString('de-DE')}</div></div></div>).join('');}else{listDiv.innerHTML='<div class="loading-txt">لا يوجد فائزون بعد</div>';}}catch(e){}
}
async function loadAdminStats(){if(!isAdmin||!initData)return; try{const r=await authFetch(`${API}/api/lucky/admin/stats?period=${currentPeriod}`);const d=await r.json();document.getElementById('adm-active-now').textContent=d.active_now||0;document.getElementById('adm-active-today').textContent=d.active_today||0;document.getElementById('adm-profit').textContent=(d.profit||0).toLocaleString('de-DE');document.getElementById('adm-loss').textContent=(d.loss||0).toLocaleString('de-DE');document.getElementById('adm-games').textContent=d.total_games||0;const net=(d.profit||0)-(d.loss||0);document.getElementById('adm-net').textContent=(net>=0?'+':'')+net.toLocaleString('de-DE');}catch(e){}}
function selectPeriod(btn){document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentPeriod=btn.dataset.period;loadAdminStats();}
async function checkAdmin(){if(!initData)return; try{const r=await authFetch(`${API}/api/lucky/admin/check`);const d=await r.json();if(d.is_admin){isAdmin=true;document.getElementById('admin-tab-btn').style.display='';}}catch(e){}}
checkAdmin();
setInterval(()=>{if(initData)authFetch(`${API}/api/lucky/ping`).catch(()=>{});},60000);
refreshPublicLeaderboard();
setInterval(()=>{refreshPublicLeaderboard();},45000);
function closeUserModal(e){if(e.target===document.getElementById('user-modal'))document.getElementById('user-modal').classList.add('hidden');}
</script>
